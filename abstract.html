<div class="max-w-3xl mx-auto py-16 px-6">
  <h1 class="text-3xl font-bold mb-8 text-center">Submit Your Abstract</h1>
<h1 class="text-1xl font-bold mb-8 text-center">Page in preparation...  </h1>

  <form class="space-y-6 bg-white p-8 rounded-2xl shadow">

    <div>
      <label class="block font-medium">Title</label>
      <input type="text" class="w-full border p-3 rounded-lg" required>
    </div>

    <div>
      <label class="block font-medium">Authors</label>
      <input type="text" class="w-full border p-3 rounded-lg">
    </div>

    <div>
      <label class="block font-medium">Abstract</label>
      <textarea class="w-full border p-3 rounded-lg h-40"></textarea>
    </div>

    <div>
      <label class="block font-medium">Upload PDF</label>
      <input type="file" class="w-full">
    </div>

    <button class="w-full bg-indigo-600 text-white py-3 rounded-xl">
      Submit Abstract
    </button>

  </form>
</div>
