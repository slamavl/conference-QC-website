<div class="max-w-3xl mx-auto py-16 px-6">
  <h1 class="text-3xl font-bold mb-8 text-center">Conference Registration</h1>
 <h1 class="text-1xl font-bold mb-8 text-center">Page in preparation... Add abstract submission link... </h1>

  <form action="https://formspree.io/f/xzdjyjar" method="POST" class="space-y-6 bg-white p-8 rounded-2xl shadow">

    <div>
      <label class="block font-medium">Full Name</label>
      <input type="text" name="name" placeholder="Full Name" class="w-full border p-3 rounded-lg" required>
    </div>

    <div>
      <label class="block font-medium">Email</label>
      <input type="email" name="email" placeholder="Email"  class="w-full border p-3 rounded-lg" required>
    </div>

    <div>
      <label class="block font-medium">Affiliation</label>
      <input type="text" name="affiliation" placeholder="Affiliation" class="w-full border p-3 rounded-lg">
    </div>

    <div>
      <label class="block font-medium">Participation Type</label>
      <select name="participation" class="w-full border p-3 rounded-lg">
        <optio  value="listener"n>Listener</option>
        <option value="poster">Poster</option>
        <option value="talk">Contributed talk</option>
      </select>
    </div>

    <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl">
      Submit Registration
    </button>

  </form>
</div>
